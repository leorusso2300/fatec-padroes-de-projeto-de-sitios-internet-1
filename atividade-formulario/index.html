<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, sans-serif;
      background: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      color: #0f172a;
    }

    .card {
      width: min(100%, 420px);
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .brand {
      margin: 0 0 24px;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      font-weight: 700;
      color: #1e293b;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #475569;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-size: 1rem;
      color: #0f172a;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      margin-bottom: 18px;
    }

    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      background: #ffffff;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: #4f46e5;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    button:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 18px;
      font-size: 0.92rem;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="brand">Cadastro</h1>
    <p class="subtitle">Preencha o formulário abaixo para enviar seus dados via GET.</p>

    <form>
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required />

      <label for="idade">Idade</label>
      <input type="number" id="idade" name="idade" placeholder="Sua idade" min="0" required />

      <button type="submit">Cadastrar</button>
    </form>

    <p class="note">O formulário será enviado via <strong>GET</strong> para <code>https://aulas.vitorsilverio.dev/formulario/acao</code>.</p>
  </main>
</body>
</html>
